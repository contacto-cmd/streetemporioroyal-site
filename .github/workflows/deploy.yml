name: Enterprise Deploy 

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        # Entramos a tu carpeta real backend/web
        run: npm install
        working-directory: ./backend/web

      - name: Build project
        # Solo confirmamos que todo está sincronizado
        run: echo "Royal System Synchronized"
        working-directory: ./backend/web
