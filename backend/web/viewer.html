<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Royal 3D Viewer 👑</title>
    <style>html,body{height:100%;margin:0;background:#000;} canvas{display:block;}</style>
</head>
<body>
    <div id="info" style="position:fixed;z-index:9;padding:10px;color:#00e1ff;font-family:monospace;">
        Sovereign 3D Engine :: Active
    </div>
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';
        const scene=new THREE.Scene();
        const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
        const renderer=new THREE.WebGLRenderer({antialias:true}); 
        renderer.setSize(window.innerWidth,window.innerHeight); 
        document.body.appendChild(renderer.domElement);
        const light=new THREE.DirectionalLight(0xffffff,1); 
        light.position.set(5,10,7.5); scene.add(light);
        const loader=new GLTFLoader();
        loader.load('https://modelviewer.dev/shared-assets/models/Astronaut.glb', (gltf)=>{ 
            scene.add(gltf.scene); 
            camera.position.set(0,1.6,3); 
            animate(); 
        }, undefined, (err)=>console.error(err));
        function animate(){ 
            requestAnimationFrame(animate); 
            scene.rotation.y += 0.005; 
            renderer.render(scene,camera); 
        }
        window.addEventListener('resize',()=>{ 
            camera.aspect = window.innerWidth/window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth,window.innerHeight); 
        });
    </script>
</body>
</html>
